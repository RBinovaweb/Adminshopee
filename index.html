<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#111;color:#fff;margin:0;padding:20px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px}
button{background:#ff4d00;color:#fff;cursor:pointer}
.card{background:#222;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>

<h2>🔐 Dashboard Admin</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<hr>

<input type="text" id="title" placeholder="Nome Produto">
<input type="text" id="price" placeholder="Preço">
<input type="text" id="link" placeholder="Link Shopee">
<input type="file" id="images" multiple>
<button onclick="addProduct()">Adicionar Produto</button>

<div id="productList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq8LMWU3QLPoDoFmmEnc86NjGz32NJX2s",
  authDomain: "achadinhosdamilly-b4625.firebaseapp.com",
  projectId: "achadinhosdamilly-b4625",
  storageBucket: "achadinhosdamilly-b4625.firebasestorage.app",
  messagingSenderId: "51478199030",
  appId: "1:51478199030:web:9d5a6f7080c95340ee4ad7"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

window.login=function(){
signInWithEmailAndPassword(auth,email.value,password.value)
.then(()=>alert("Logado"))
.catch(()=>alert("Erro login"));
}

window.addProduct=async function(){
let urls=[];
for(let file of images.files){
const r=ref(storage,"products/"+Date.now()+file.name);
await uploadBytes(r,file);
urls.push(await getDownloadURL(r));
}
await addDoc(collection(db,"products"),{
title:title.value,
price:price.value,
link:link.value,
images:urls
});
alert("Adicionado");
}

onSnapshot(collection(db,"products"),snap=>{
productList.innerHTML="";
snap.forEach(d=>{
const p=d.data();
productList.innerHTML+=`
<div class="card">
${p.title} - ${p.price}
<button onclick="removeProduct('${d.id}')">Remover</button>
</div>`;
});
});

window.removeProduct=async function(id){
await deleteDoc(doc(db,"products",id));
}
</script>

</body>
</html>
